<h2>Login</h2>
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}

<form method="POST">
    Account Number:<br>
    <input type="text" name="account"><br><br>

    PIN:<br>
    <input type="password" name="pin"><br><br>

    <button type="submit">Login</button>
</form>
